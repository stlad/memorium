version: '3.8'
name: nebula

services:
  nebula-postgres:
    image: 'postgres:16'
    container_name: nebula-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - PGUSER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "--quiet"]
      interval: 1s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data/:rw
    networks:
      - nebulaNet


networks:
  nebulaNet:
    name: nebulaNet
    driver: bridge

    
volumes:
  postgres_data: